<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    /* Botão ativo do menu — dourado persistente */
    .btn-menu.active {
      background: #FFD700 !important;
      color: #111 !important;
      border-color: #FFD700 !important;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>

  <h2 id="tituloPagina">Painel ADM</h2>

  <!-- =====================================
       🔍 BUSCA
  ===================================== -->
  <div class="codigo">
    <div class="estado-box">
      <input id="estado" maxlength="2" placeholder="UF" autocomplete="off">
      <select id="listaEstados">
        <option value="">UF</option>
        <option>MA</option>
        <option>SP</option>
        <option>RJ</option>
        <option>CE</option>
      </select>
    </div>
    <span class="traco">-</span>
    <input id="c1" maxlength="1" inputmode="numeric">
    <input id="c2" maxlength="1" inputmode="numeric">
    <input id="c3" maxlength="1" inputmode="numeric">
    <input id="c4" maxlength="1" inputmode="numeric">
    <input id="c5" maxlength="1" inputmode="numeric">
    <input id="c6" maxlength="1" inputmode="numeric">
  </div>

  <button class="btn" id="btn-buscar" onclick="buscar('btn-buscar')">Procurar usuário</button>

  <div class="linha"></div>

  <!-- =====================================
       🔥 MENU
  ===================================== -->
  <div class="menu-scroll">

    <button class="btn-menu" id="btn-ativos"      onclick="verAtivos('btn-ativos')">Ativos</button>
    <button class="btn-menu" id="btn-inativos"    onclick="verInativos('btn-inativos')">Inativos</button>
    <button class="btn-menu" id="btn-validacoes"  onclick="verValidacoes('btn-validacoes')">Validações</button>
    <button class="btn-menu btn-menu-empresas"    id="btn-empresas"    onclick="verEmpresas('btn-empresas')">Empresas</button>
    <button class="btn-menu btn-menu-premiacoes"  id="btn-premiacoes"  onclick="verPremiacoes('btn-premiacoes')"> Premiações</button>
    <button class="btn-menu btn-menu-sorteios"    id="btn-sorteios"    onclick="verSorteios('btn-sorteios')"> Sorteios</button>
    <button class="btn-menu" id="btn-gerar"       onclick="gerarCodigo()">Gerar Código</button>
    <button class="btn-menu" id="btn-todos"       onclick="listarClientes('btn-todos')">Todos</button>

  </div>

  <!-- =====================================
       🔥 TOPO NAVEGAÇÃO
  ===================================== -->
  <div id="topoNavegacao" class="topo-navegacao hidden">
    <button class="btn-voltar" onclick="history.back()">← Voltar</button>
    <div id="tituloSecao">Empresas</div>
  </div>

  <!-- =====================================
       🔥 LISTA PRINCIPAL
  ===================================== -->
  <div id="lista"></div>

  <!-- =====================================
       🔥 MODAL DETALHES
  ===================================== -->
  <div id="modalDetalhes" class="modal hidden">
    <div class="modal-box">
      <div class="modal-topo">
        <h3>Histórico do Cliente</h3>
        <button class="fechar-modal" onclick="fecharModal()">✕</button>
      </div>
      <div id="conteudoModal"></div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>

</body>
</html>
